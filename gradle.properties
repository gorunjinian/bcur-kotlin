kotlin.code.style=official
kotlin.mpp.stability.nowarn=true
android.useAndroidX=true

# Maven Central publishing
SONATYPE_HOST=CENTRAL_PORTAL
RELEASE_SIGNING_ENABLED=true

# Set these in ~/.gradle/gradle.properties (NOT in this file, to keep secrets out of git):
# mavenCentralUsername=<your Sonatype Central username>
# mavenCentralPassword=<your Sonatype Central password/token>
# signing.keyId=<last 8 chars of your GPG key ID>
# signing.password=<your GPG key passphrase>
# signing.secretKeyRingFile=<path to your .gpg secring file>
